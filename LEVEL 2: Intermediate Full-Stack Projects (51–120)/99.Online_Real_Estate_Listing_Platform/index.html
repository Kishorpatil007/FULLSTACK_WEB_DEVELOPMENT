<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 RealEstateHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <nav class="navbar">
        <div class="nav-brand">🏠 RealEstateHub</div>
        <ul class="nav-menu">
            <li><a href="#" data-tab="dashboard" class="active">Dashboard</a></li>
            <li><a href="#" data-tab="properties">Properties</a></li>
            <li><a href="#" data-tab="agents">Agents</a></li>
            <li><a href="#" data-tab="inquiries">Inquiries</a></li>
        </ul>
    </nav>
    <div class="content">
        <div id="dashboard" class="tab-content active">
            <div class="dashboard-header"><h1>🏠 RealEstateHub</h1><p>Manage your operations efficiently</p></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="propertyCount">0</div><div class="stat-label">Properties</div></div>
                <div class="stat-card"><div class="stat-number" id="agentCount">0</div><div class="stat-label">Agents</div></div>
                <div class="stat-card"><div class="stat-number" id="inquiryCount">0</div><div class="stat-label">Inquiries</div></div>
                <div class="stat-card"><div class="stat-number" id="avgPrice">0</div><div class="stat-label">Avg Price</div></div>
            </div>
        </div>

            <div id="properties" class="tab-content">
                <div class="section-header">
                    <h2>Properties</h2>
                    <button class="btn-primary" onclick="toggleForm('propertiesForm')">+ Add</button>
                </div>
                <form id="propertiesForm" class="form-container" style="display:none">
                    <h3>Add Propertie</h3>
                    <input type="text" id="propertiesName" placeholder="Name" required>
                    <input type="text" id="propertiesInfo" placeholder="Details" required>
                    <button type="button" class="btn-primary" onclick="addProperties()">Add</button>
                </form>
                <div id="propertiesList" class="list-container"></div>
            </div>
            <div id="agents" class="tab-content">
                <div class="section-header">
                    <h2>Agents</h2>
                    <button class="btn-primary" onclick="toggleForm('agentsForm')">+ Add</button>
                </div>
                <form id="agentsForm" class="form-container" style="display:none">
                    <h3>Add Agent</h3>
                    <input type="text" id="agentsName" placeholder="Name" required>
                    <input type="text" id="agentsInfo" placeholder="Details" required>
                    <button type="button" class="btn-primary" onclick="addAgents()">Add</button>
                </form>
                <div id="agentsList" class="list-container"></div>
            </div>
            <div id="inquiries" class="tab-content">
                <div class="section-header">
                    <h2>Inquiries</h2>
                    <button class="btn-primary" onclick="toggleForm('inquiriesForm')">+ Add</button>
                </div>
                <form id="inquiriesForm" class="form-container" style="display:none">
                    <h3>Add Inquirie</h3>
                    <input type="text" id="inquiriesName" placeholder="Name" required>
                    <input type="text" id="inquiriesInfo" placeholder="Details" required>
                    <button type="button" class="btn-primary" onclick="addInquiries()">Add</button>
                </form>
                <div id="inquiriesList" class="list-container"></div>
            </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
