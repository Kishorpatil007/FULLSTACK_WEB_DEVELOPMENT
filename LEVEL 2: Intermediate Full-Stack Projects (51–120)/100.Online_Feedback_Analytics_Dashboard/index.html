<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 FeedbackIQ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <nav class="navbar">
        <div class="nav-brand">📊 FeedbackIQ</div>
        <ul class="nav-menu">
            <li><a href="#" data-tab="dashboard" class="active">Dashboard</a></li>
            <li><a href="#" data-tab="surveys">Surveys</a></li>
            <li><a href="#" data-tab="responses">Responses</a></li>
        </ul>
    </nav>
    <div class="content">
        <div id="dashboard" class="tab-content active">
            <div class="dashboard-header"><h1>📊 FeedbackIQ</h1><p>Manage your operations efficiently</p></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="surveyCount">0</div><div class="stat-label">Surveys</div></div>
                <div class="stat-card"><div class="stat-number" id="responseCount">0</div><div class="stat-label">Responses</div></div>
                <div class="stat-card"><div class="stat-number" id="avgRating">0</div><div class="stat-label">Avg Rating</div></div>
                <div class="stat-card"><div class="stat-number" id="npsScore">0</div><div class="stat-label">NPS Score</div></div>
            </div>
        </div>

            <div id="surveys" class="tab-content">
                <div class="section-header">
                    <h2>Surveys</h2>
                    <button class="btn-primary" onclick="toggleForm('surveysForm')">+ Add</button>
                </div>
                <form id="surveysForm" class="form-container" style="display:none">
                    <h3>Add Survey</h3>
                    <input type="text" id="surveysName" placeholder="Name" required>
                    <input type="text" id="surveysInfo" placeholder="Details" required>
                    <button type="button" class="btn-primary" onclick="addSurveys()">Add</button>
                </form>
                <div id="surveysList" class="list-container"></div>
            </div>
            <div id="responses" class="tab-content">
                <div class="section-header">
                    <h2>Responses</h2>
                    <button class="btn-primary" onclick="toggleForm('responsesForm')">+ Add</button>
                </div>
                <form id="responsesForm" class="form-container" style="display:none">
                    <h3>Add Response</h3>
                    <input type="text" id="responsesName" placeholder="Name" required>
                    <input type="text" id="responsesInfo" placeholder="Details" required>
                    <button type="button" class="btn-primary" onclick="addResponses()">Add</button>
                </form>
                <div id="responsesList" class="list-container"></div>
            </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
