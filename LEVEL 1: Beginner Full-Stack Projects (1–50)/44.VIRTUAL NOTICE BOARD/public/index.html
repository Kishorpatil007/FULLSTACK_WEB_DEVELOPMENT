<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Notice Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Virtual Notice Board</h1>
    <div class="notice-form">
        <input type="text" id="title" placeholder="Notice Title">
        <textarea id="description" placeholder="Notice Description"></textarea>
        <button id="addNoticeBtn">Add Notice</button>
    </div>
    <div class="notices" id="notices"></div>
</div>
<script src="script.js"></script>
</body>
</html>
