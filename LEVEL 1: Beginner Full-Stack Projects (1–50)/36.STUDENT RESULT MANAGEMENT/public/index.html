<!DOCTYPE html>
<html>
<head>
  <title>Student Result Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎓 Student Result Management</h1>

  <form id="resultForm">
    <input type="text" id="name" placeholder="Student Name" required>
    <input type="text" id="roll" placeholder="Roll Number" required>
    <input type="number" id="math" placeholder="Math Marks" required>
    <input type="number" id="science" placeholder="Science Marks" required>
    <input type="number" id="english" placeholder="English Marks" required>
    <button>Submit Result</button>
  </form>

  <h3>Student Results</h3>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Roll</th>
        <th>Math</th>
        <th>Science</th>
        <th>English</th>
        <th>Total</th>
        <th>Percentage</th>
      </tr>
    </thead>
    <tbody id="resultList"></tbody>
  </table>
</div>

<script src="script.js"></script>
</body>
</html>
