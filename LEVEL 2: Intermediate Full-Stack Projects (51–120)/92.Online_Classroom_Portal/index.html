<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏫 ClassPortal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <nav class="navbar">
        <div class="nav-brand">🏫 ClassPortal</div>
        <ul class="nav-menu">
            <li><a href="#" data-tab="dashboard" class="active">Dashboard</a></li>
            <li><a href="#" data-tab="classes">Classes</a></li>
            <li><a href="#" data-tab="students">Students</a></li>
            <li><a href="#" data-tab="assignments">Assignments</a></li>
        </ul>
    </nav>
    <div class="content">
        <div id="dashboard" class="tab-content active">
            <div class="dashboard-header"><h1>🏫 ClassPortal</h1><p>Manage your operations efficiently</p></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="classCount">0</div><div class="stat-label">Classes</div></div>
                <div class="stat-card"><div class="stat-number" id="studentCount">0</div><div class="stat-label">Students</div></div>
                <div class="stat-card"><div class="stat-number" id="assignmentCount">0</div><div class="stat-label">Assignments</div></div>
                <div class="stat-card"><div class="stat-number" id="avgScore">0</div><div class="stat-label">Avg Score</div></div>
            </div>
        </div>

            <div id="classes" class="tab-content">
                <div class="section-header">
                    <h2>Classes</h2>
                    <button class="btn-primary" onclick="toggleForm('classesForm')">+ Add</button>
                </div>
                <form id="classesForm" class="form-container" style="display:none">
                    <h3>Add Classe</h3>
                    <input type="text" id="classesName" placeholder="Name" required>
                    <input type="text" id="classesInfo" placeholder="Details" required>
                    <button type="button" class="btn-primary" onclick="addClasses()">Add</button>
                </form>
                <div id="classesList" class="list-container"></div>
            </div>
            <div id="students" class="tab-content">
                <div class="section-header">
                    <h2>Students</h2>
                    <button class="btn-primary" onclick="toggleForm('studentsForm')">+ Add</button>
                </div>
                <form id="studentsForm" class="form-container" style="display:none">
                    <h3>Add Student</h3>
                    <input type="text" id="studentsName" placeholder="Name" required>
                    <input type="text" id="studentsInfo" placeholder="Details" required>
                    <button type="button" class="btn-primary" onclick="addStudents()">Add</button>
                </form>
                <div id="studentsList" class="list-container"></div>
            </div>
            <div id="assignments" class="tab-content">
                <div class="section-header">
                    <h2>Assignments</h2>
                    <button class="btn-primary" onclick="toggleForm('assignmentsForm')">+ Add</button>
                </div>
                <form id="assignmentsForm" class="form-container" style="display:none">
                    <h3>Add Assignment</h3>
                    <input type="text" id="assignmentsName" placeholder="Name" required>
                    <input type="text" id="assignmentsInfo" placeholder="Details" required>
                    <button type="button" class="btn-primary" onclick="addAssignments()">Add</button>
                </form>
                <div id="assignmentsList" class="list-container"></div>
            </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
