<!DOCTYPE html>
<html>
<head>
  <title>Daily Planner App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📝 Daily Planner</h1>

  <form id="taskForm">
    <input type="text" id="task" placeholder="Enter task" required>
    <input type="date" id="date" required>
    <button>Add Task</button>
  </form>

  <h2>Tasks</h2>
  <div id="taskList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
