<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Tracker Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">🐛 Bug Tracker Pro</h1>
                <p class="subtitle">Track, manage, and resolve bugs with ease</p>
            </div>
        </header>

        <main class="main-content">
            <div class="sidebar">
                <div class="add-bug-section">
                    <h2>Report New Bug</h2>
                    <form id="bugForm">
                        <div class="form-group">
                            <label for="title">Bug Title</label>
                            <input type="text" id="title" placeholder="Brief description..." required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" placeholder="Detailed description..." rows="4" required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="severity">Severity</label>
                            <select id="severity" required>
                                <option value="">Select Severity</option>
                                <option value="Critical">🔴 Critical</option>
                                <option value="High">🟠 High</option>
                                <option value="Medium">🟡 Medium</option>
                                <option value="Low">🟢 Low</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="assignee">Assigned To</label>
                            <input type="text" id="assignee" placeholder="Developer name..." required>
                        </div>
                        <button type="submit" class="btn-submit">Report Bug</button>
                    </form>
                </div>

                <div class="filters-section">
                    <h3>Filters</h3>
                    <div class="filter-group">
                        <label>
                            <input type="radio" name="filter" value="all" checked> All Bugs
                        </label>
                        <label>
                            <input type="radio" name="filter" value="open"> Open
                        </label>
                        <label>
                            <input type="radio" name="filter" value="closed"> Closed
                        </label>
                    </div>
                </div>
            </div>

            <div class="bugs-container">
                <div class="stats">
                    <div class="stat-card">
                        <span class="stat-number" id="totalBugs">0</span>
                        <span class="stat-label">Total Bugs</span>
                    </div>
                    <div class="stat-card critical">
                        <span class="stat-number" id="criticalCount">0</span>
                        <span class="stat-label">Critical</span>
                    </div>
                    <div class="stat-card high">
                        <span class="stat-number" id="highCount">0</span>
                        <span class="stat-label">High</span>
                    </div>
                    <div class="stat-card medium">
                        <span class="stat-number" id="mediumCount">0</span>
                        <span class="stat-label">Medium</span>
                    </div>
                    <div class="stat-card low">
                        <span class="stat-number" id="lowCount">0</span>
                        <span class="stat-label">Low</span>
                    </div>
                </div>

                <div id="bugsList" class="bugs-list"></div>
                <div id="emptyState" class="empty-state">
                    <p>📭 No bugs reported yet. Great job!</p>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button id="markResolvedBtn" class="btn btn-success">Mark as Resolved</button>
                <button id="deleteBugBtn" class="btn btn-danger">Delete Bug</button>
                <button id="closeModalBtn" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
